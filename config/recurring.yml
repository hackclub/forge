production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  uptime_ping:
    class: UptimePingJob
    queue: uptime
    schedule: every minute

  reel_payouts:
    class: ReelPayoutJob
    queue: background
    schedule: every day at 3am

  airtable_sync_check:
    class: AirtableSyncCheckJob
    queue: background
    schedule: every 15 minutes

  sync_all_journals:
    class: SyncAllJournalsJob
    queue: background
    schedule: every hour at minute 30

  streak_freeze_check:
    class: StreakFreezeCheckJob
    queue: background
    schedule: every hour

  compute_guild_multipliers:
    class: ComputeGuildMultipliersJob
    queue: background
    schedule: every Sunday at 0:00
